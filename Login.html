<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Register | Glucode</title>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="./css/login.css">
  <link rel="stylesheet" href="./css/theme.css">
</head>
<body>
  <select class="theme-select" id="themeSelect">
    <option value="light">Light Theme</option>
    <option value="dark">Dark Theme</option>
    <option value="halloween">Halloween</option>
    <option value="winter">Winter</option>
    <option value="easter">Easter</option>
  </select>

  <div class="login-wrapper">
    <div class="login-container">
      <h2 id="title">Login</h2>
      <div class="input-group">
        <input type="text" id="username" placeholder="Username / Email">
      </div>
      <div class="input-group hidden" id="emailGroup">
        <input type="email" id="email" placeholder="Email">
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Password">
      </div>
      <button class="login-btn" id="mainBtn">Login</button>
      <p id="message"></p>
      <div class="footer-text">
        <span id="toggleText">Don't have an account?</span>
        <span class="link" id="toggleModeBtn">SIGN UP</span>
      </div>
    </div>
  </div>

  <script src="./script/theme.js"></script>
  <script src="./script/login.js"></script>
</body>
</html>
