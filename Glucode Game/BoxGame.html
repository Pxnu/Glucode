<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Glucode - HTML Learning Game</title>
<link rel="stylesheet" href="../css/theme.css">
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/navbar.css">
<link rel="stylesheet" href="../css/boxgame.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* ==============================================================
       แก้ปัญหา Navbar เป็นกล่องสีขาว (ล้างค่า CSS ที่ตีกัน)
    ============================================================== */
    
    /* 1. รีเซ็ตค่า .container ที่อยู่เฉพาะใน Navbar ให้กลับมาโปร่งใส */
    nav .container {
        background: transparent !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        max-width: 1440px !important;
        margin: 0 auto !important;
        padding: 2.25rem !important;
        width: 100% !important;
    }
    
    /* 2. บังคับให้ Navbar ดันขึ้นไปติดขอบบนสุดของจอ */
    body {
        justify-content: flex-start !important;
    }
    
    /* 3. ดันเฉพาะ "กล่องเกม" ให้เลื่อนลงมาไม่ให้โดน Navbar บัง */
    .container:not(nav .container) {
        margin-top: 50px !important;
    }
</style>
</head>

<body>

    <nav style="width: 100%; z-index: 100;">
        <div class="container">
            <div class="logo">
                <a href="../Home.html" style="color: var(--text); font-weight: bold; font-size: 2rem; text-decoration: none;">Glucode</a>
            </div>
            <ul>
              <li><a href="../Home.html">Home</a></li>
              <li><a href="#">Learn</a></li>
              <li><a href="#">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 style="margin-top:0; margin-bottom:20px; font-size:2.2rem; text-align:left;">Glucode</h1>
        <div id="levelTitle"></div>
        <h2 id="question"></h2>

        <div class="answer-container">
            <div id="answerArea"></div>
            <button class="btn-submit" onclick="submitAnswer()">Submit</button>
        </div>

        <div id="choices"></div>

        <div class="control-buttons">
            <button class="btn-secondaryDel" onclick="removeLast()">Delete</button>
            <button class="btn-secondaryRe" onclick="resetBoard()">&#10227;</button>
            <button class="btn-secondarySkip" onclick="skipToFinish()">Skip</button>
            <div id="scoreTitle"></div>
        </div>

        <div id="result"></div>
    </div>

    <div id="finishPopup" class="popup-overlay">
        <div class="popup-box">
            <button class="close-popup" onclick="closePopup()">×</button>
            <h2>🎉 ยินดีด้วย!</h2>
            <p>คุณเล่นจบครบทุกด่านแล้ว</p>
            <p id="finalScoreText" style="font-weight: bold; color: var(--hover);">Score: 0</p>
            <div class="popup-buttons">
                <button onclick="playAgain()">เล่นอีกครั้ง</button>
                <button onclick="goHome()" class="goHome">กลับหน้าหลัก</button>
            </div>
        </div>
    </div>

    <script src="../script/theme.js"></script>
    <script src="../script/auth.js"></script>
    <script src="../script/ui.js"></script>
    <script src="../script/data.js"></script>
    <script src="../script/boxgame.js"></script>

</body>
</html>
