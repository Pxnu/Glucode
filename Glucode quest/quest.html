<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quests | Glucode</title>
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/quest.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="container" style="max-width: 1440px;">
            <div class="logo">
                <a href="../Home.html" style="color: var(--text); font-weight: bold; font-size: 2rem;">Glucode</a>
            </div>
            <ul>
              <li><a href="../Home.html">Home</a></li>
              <li><a href="#">Learn</a></li>
              <li><a href="#">Leader Board</a></li>
            </ul>
        </div>
    </nav>

    <div class="quest-container">
        <header>
            <h1>Glucode Quests</h1>
            <p class="subtext">ทำภารกิจเพื่อรับเหรียญรางวัล</p>
        </header>

        <div class="point-and-achievement">
            <div class="currency-display">
                <span class="coin-icon">💰</span>
                <span id="user-coins">0</span>
            </div>

            <div class="achievement">
                <a href="#">Achievement</a>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><span class="stat-label">Games Played</span><span class="stat-value" id="total-games">0/100</span></div>
            <div class="stat-box"><span class="stat-label">Best Streak</span><span class="stat-value" id="streak-count">🔥</span></div>
        </div>
        <div id="quest-list"></div>
    </div>

    <script src="../script/theme.js"></script>
    <script src="../script/auth.js"></script>
    <script src="../script/ui.js"></script>
    <script src="../script/quest.js"></script>
</body>
</html>
