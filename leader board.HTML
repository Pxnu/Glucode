<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #ffffff;
    color: #111;
    text-align: center;
}

h1 {
    margin: 30px 0 10px;
    font-weight: 600;
    letter-spacing: 3px;
}

.container {
    width: 50%;
    margin: auto;
    background: #fff;
    border-radius: 16px;
    padding: 15px;
    border: 1px solid #eee;
}

.header {
    display: grid;
    grid-template-columns: 1fr 3fr 1fr;
    padding: 14px;
    font-size: 14px;
    color: #666;
    border-bottom: 1px solid #eee;
}

.row {
    display: grid;
    grid-template-columns: 1fr 3fr 1fr;
    align-items: center;
    margin: 6px 0;
    padding: 14px;
    border-radius: 12px;
    background: #ffffff;
    transition: all 0.2s ease;
}

.header div,
.row div {
    text-align: center;
}

.player {
    font-weight: 500;
}

/* TOP 3 */
.top1 {
    font-weight: 700;
    background: #eccd32;
    color: #0d0d0d;
}

.top2 {
    background: #ada8a8;
    font-weight: 600;
}

.top3 {
    background: #9d683a;
}

/* animation */
.row {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<h1>LEADERBOARD</h1>

<div class="container">
    
    <div class="header">
        <div>อันดับ</div>
        <div>ชื่อ</div>
        <div>คะแนน</div>
    </div>

    <div id="board"></div>

</div>

<script>

// เก็บข้อมูลผู้เล่น
let players = [];

const MAX_PLAYERS = 10;

// โหลดจาก localStorage
function loadLeaderboard() {
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // แปลง users → players
    players = users.map(u => ({
        name: u.username,
        score: u.score || 0
    }));
}

// แสดงผล
function renderBoard() {
    let board = document.getElementById("board");
    board.innerHTML = "";

    if (players.length === 0) {
        board.innerHTML = "<p style='color:#aaa;'>ยังไม่มีข้อมูล</p>";
        return;
    }

    // เรียงคะแนนมาก -> น้อย
    players.sort((a, b) => b.score - a.score);

    players.forEach((p, index) => {
        let row = document.createElement("div");
        row.className = "row " + getTopClass(index);

        row.innerHTML = `
            <div>${index + 1}</div>
            <div class="player">${p.name}</div>
            <div>${p.score}</div>
        `;

        board.appendChild(row);
    });
}

// ใส่สี TOP 3
function getTopClass(index) {
    if (index === 0) return "top1";
    if (index === 1) return "top2";
    if (index === 2) return "top3";
    return "";
}

// ฟังก์ชันรับคะแนนจากเกม
function addScoreFromGame(name, score) {

    loadLeaderboard();

    players.push({ name, score });

    // เรียง
    players.sort((a, b) => b.score - a.score);

    // จำกัด 10 อันดับ
    players = players.slice(0, MAX_PLAYERS);

    // บันทึก
    localStorage.setItem("leaderboard", JSON.stringify(players));

    renderBoard();
}

// ⭐ โหลด + แสดงทันทีตอนเปิดหน้า
loadLeaderboard();
renderBoard();

</script>

</body>
</html>
